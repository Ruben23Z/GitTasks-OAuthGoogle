<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitTasks - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 50%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de partículas animadas no fundo */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(88, 166, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
            animation: floatParticles 20s ease-in-out infinite;
        }

        @keyframes floatParticles {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }
            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }

        .container {
            background: linear-gradient(135deg, rgba(22, 27, 34, 0.95) 0%, rgba(13, 17, 23, 0.98) 100%);
            backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(139, 92, 246, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 580px;
            width: 100%;
            text-align: center;
            position: relative;
            animation: containerFadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Brilho animado no topo do container */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                #58a6ff 0%, 
                #8b5cf6 25%, 
                #22c55e 50%, 
                #8b5cf6 75%, 
                #58a6ff 100%);
            background-size: 200% 100%;
            animation: gradientShift 3s linear infinite;
            border-radius: 24px 24px 0 0;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        /* Logo GitTasks animado */
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            color: white;
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
            animation: logoPulse 2s ease-in-out infinite;
            position: relative;
        }

        .logo::before {
            content: 'GT';
            position: absolute;
        }

        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 40px rgba(88, 166, 255, 0.5);
            }
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.2);
            }
        }

        .subtitle {
            color: #8b949e;
            font-size: 17px;
            margin-bottom: 40px;
            font-weight: 500;
            animation: subtitleSlide 0.8s ease-out 0.2s backwards;
        }

        @keyframes subtitleSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 32px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 100%);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(88, 166, 255, 0.3);
            position: relative;
            overflow: hidden;
            animation: linkSlideIn 0.6s ease-out 0.3s backwards;
        }

        @keyframes linkSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Efeito de brilho ao hover */
        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .nav-link:hover::before {
            left: 100%;
        }

        .nav-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 24px rgba(88, 166, 255, 0.5);
        }

        .nav-link:active {
            transform: translateY(-1px);
        }

        .nav-link svg {
            width: 22px;
            height: 22px;
        }

        /* Seção de papel do utilizador */
        .role-section {
            background: rgba(139, 92, 246, 0.1);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            animation: roleSlideIn 0.6s ease-out 0.4s backwards;
        }

        @keyframes roleSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .role-label {
            color: #8b949e;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        #user-role {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
            color: white;
            border-radius: 24px;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
            animation: roleBadgePulse 2s ease-in-out infinite;
        }

        @keyframes roleBadgePulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* Controles de alteração de papel */
        .role-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        label {
            color: #c9d1d9;
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            margin-bottom: 4px;
            display: block;
        }

        #role-select {
            flex: 1;
            padding: 14px 18px;
            background: rgba(22, 27, 34, 0.8);
            border: 2px solid rgba(139, 92, 246, 0.4);
            border-radius: 12px;
            color: #c9d1d9;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        #role-select:hover {
            border-color: rgba(139, 92, 246, 0.6);
            background: rgba(22, 27, 34, 0.95);
        }

        #role-select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .logout-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            color: #f87171;
            text-decoration: none;
            border: 2px solid rgba(248, 113, 113, 0.4);
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 24px;
            animation: logoutSlideIn 0.6s ease-out 0.5s backwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes logoutSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logout-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .logout-link:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .logout-link:hover {
            background: transparent;
            border-color: #ef4444;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        .logout-link svg {
            width: 18px;
            height: 18px;
        }

        /* Indicador de loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }

            .logo {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }

            h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 15px;
            }

            .nav-link {
                padding: 16px 24px;
                font-size: 15px;
            }

            .role-section {
                padding: 20px;
            }

            #user-role {
                font-size: 16px;
                padding: 8px 20px;
            }

            .control-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        /* Efeito de hover suave em toda a página */
        @media (hover: hover) {
            * {
                transition: all 0.3s ease;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo"></div>
        
        <h1>Dashboard</h1>
        <p class="subtitle">Bem-vindo ao GitTasks</p>

        <div class="nav-links">
            <a href="/milestones" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Consultar Milestones
            </a>
        </div>

        <div class="role-section">
            <div class="role-label">O seu papel atual</div>
            <span id="user-role">A carregar...</span>

            <div class="role-controls">
                <label for="role-select">Alterar papel</label>
                <div class="control-group">
                    <select id="role-select">
                        <option value="free">Free</option>
                        <option value="regular">Regular</option>
                        <option value="premium">Premium</option>
                    </select>
                    <button onclick="changeRole()">
                        <span>Alterar</span>
                    </button>
                </div>
            </div>
        </div>

        <a href="/logout" class="logout-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Terminar Sessão
        </a>
    </div>

    <script>
        // Busca a sessão do utilizador ao carregar a página
        async function loadSession() {
            const res = await fetch("/get-session");
            if (res.status === 401) {
                alert("Não autenticado! Serás redirecionado para login.");
                window.location.href = "/";
                return;
            }
            const data = await res.json();
            document.getElementById("user-role").textContent = data.role;
            document.getElementById("role-select").value = data.role;
        }

        async function changeRole() {
            const newRole = document.getElementById("role-select").value;
            const button = event.target;
            const originalContent = button.innerHTML;
            
            // Adicionar loading
            button.innerHTML = '<div class="loading"></div>';
            button.disabled = true;
            
            try {
                const res = await fetch("/change-role", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ role: newRole })
                });
                
                if (res.status === 401) {
                    alert("Não autenticado! Atualiza a página.");
                    return;
                }
                
                const data = await res.json();
                alert(data.message);
                document.getElementById("user-role").textContent = data.role;
            } catch (error) {
                alert("Erro ao alterar papel. Por favor, tente novamente.");
            } finally {
                button.innerHTML = originalContent;
                button.disabled = false;
            }
        }

        async function ShowRoleHTML() {
            fetch("/get-role")
                .then(res => res.json())
                .then(data => {
                    document.getElementById("user-role").textContent = data.role;
                });
        }

        async function HideBotoesFreeHTML() {
            document.addEventListener("DOMContentLoaded", async () => {
                const userRole = await getUserRole();
                document.getElementById("user-role").textContent = userRole;

                if (userRole === "free") {
                    document.querySelectorAll(".create-task-btn").forEach((btn) => {
                        btn.style.display = "none";
                    });
                }
            });
        }

        // Inicialização
        loadSession();
        ShowRoleHTML();
        HideBotoesFreeHTML();
    </script>
</body>

</html>
