<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Milestones - GitTasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;

            /* Fundo com cor base + gradientes */
            background-color: #0a0a0a;
            /* cor base escura */
            background-image:
                radial-gradient(circle at 20% 30%, rgba(88, 166, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
            background-repeat: no-repeat;
            background-size: cover;
            animation: floatParticles 20s ease-in-out infinite;
        }

        @keyframes floatParticles {
            0% {
                background-position: 0 0, 0 0, 0 0;
            }

            50% {
                background-position: 20px 30px, -20px 10px, 10px -20px;
            }

            100% {
                background-position: 0 0, 0 0, 0 0;
            }
        }

        .error-container {
            background: rgba(31, 41, 55, 0.85);
            /* glass dark */
            backdrop-filter: blur(10px);
            color: white;
            backdrop-filter: blur(20px);
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .error-message {
            color: #ffffff;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .back-link {
            display: inline-block;
            padding: 14px 32px;
            background:
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(34, 211, 238, 0.06) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .back-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }

        .back-link:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .error-container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .error-message {
                font-size: 14px;
            }

            .icon {
                width: 64px;
                height: 64px;
                font-size: 32px;
            }
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="icon">○</div>
        <h1>Sem milestones neste repositório</h1>
        <p class="error-message">Este repositório não possui milestones cadastrados. Crie milestones no GitHub para
            poder visualizá-los aqui.</p>
        <a href="/milestones" class="back-link">Voltar</a>
    </div>
</body>

</html>
