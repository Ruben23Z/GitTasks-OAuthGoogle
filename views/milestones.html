<!-- milestones-html -->

<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitTasks - Consultar Milestones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 50%, #161b22 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de partículas animadas no fundo */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(88, 166, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
            animation: floatParticles 20s ease-in-out infinite;
        }

        @keyframes floatParticles {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }

        .container {
            background: linear-gradient(135deg, rgba(22, 27, 34, 0.95) 0%, rgba(13, 17, 23, 0.98) 100%);
            backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 24px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(139, 92, 246, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 520px;
            width: 100%;
            position: relative;
            animation: containerFadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Brilho animado no topo do container */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                    #58a6ff 0%,
                    #8b5cf6 25%,
                    #22c55e 50%,
                    #8b5cf6 75%,
                    #58a6ff 100%);
            background-size: 200% 100%;
            animation: gradientShift 3s linear infinite;
            border-radius: 24px 24px 0 0;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        /* Ícone GitHub animado */
        .github-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
            animation: iconPulse 2s ease-in-out infinite;
            position: relative;
        }

        .github-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        @keyframes iconPulse {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 10px 30px rgba(88, 166, 255, 0.3);
            }

            50% {
                transform: scale(1.05) rotate(5deg);
                box-shadow: 0 15px 40px rgba(88, 166, 255, 0.5);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: headerSlide 0.6s ease-out 0.2s backwards;
        }

        @keyframes headerSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.2);
            }
        }

        .header p {
            color: #8b949e;
            font-size: 16px;
            font-weight: 500;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: formSlide 0.6s ease-out backwards;
            position: relative;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.3s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.4s;
        }

        @keyframes formSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        label {
            font-size: 15px;
            font-weight: 700;
            color: #c9d1d9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label svg {
            width: 18px;
            height: 18px;
            stroke: #58a6ff;
        }

        input {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            background: rgba(22, 27, 34, 0.6);
            color: #c9d1d9;
            position: relative;
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(22, 27, 34, 0.9);
            box-shadow:
                0 0 0 4px rgba(139, 92, 246, 0.15),
                0 4px 16px rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #6e7681;
            font-weight: 500;
        }

        /* Efeito de foco nos inputs */
        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #58a6ff, #8b5cf6);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            border-radius: 2px;
        }

        .form-group:focus-within::after {
            transform: scaleX(1);
        }

        button {
            padding: 18px 32px;
            background: linear-gradient(135deg, #58a6ff 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
            font-family: inherit;
            position: relative;
            overflow: hidden;
            animation: buttonSlide 0.6s ease-out 0.5s backwards;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @keyframes buttonSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Efeito de onda ao clicar */
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 400px;
            height: 400px;
        }

        /* Brilho deslizante */
        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::after {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        button svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        button:hover svg {
            transform: translateX(3px);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #8b949e;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: backLinkSlide 0.6s ease-out 0.6s backwards;
            border: 2px solid transparent;
        }

        @keyframes backLinkSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .back-link:hover {
            background: rgba(139, 92, 246, 0.1);
            color: #a78bfa;
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateX(-3px);
        }

        .back-link:hover svg {
            transform: translateX(-3px);
        }

        /* Indicador de loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Badge de exemplo */
        .example-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(88, 166, 255, 0.15);
            color: #58a6ff;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            margin-left: 8px;
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }

            .github-icon {
                width: 56px;
                height: 56px;
            }

            .github-icon svg {
                width: 30px;
                height: 30px;
            }

            h1 {
                font-size: 28px;
            }

            .header p {
                font-size: 14px;
            }

            input,
            button {
                font-size: 15px;
                padding: 14px 18px;
            }

            label {
                font-size: 13px;
            }
        }

        /* Animação de entrada dos elementos */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="github-icon">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
            </svg>
        </div>

        <div class="header">
            <h1>Consultar Milestones</h1>
            <p>Insira os dados do repositório GitHub</p>
        </div>

        <form action="/github-milestones" method="GET" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="owner">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Proprietário
                    <span class="example-badge">ex: Microsoft</span>
                </label>
                <input type="text" id="owner" name="owner" placeholder="Digite o nome do proprietário" required>
            </div>

            <div class="form-group">
                <label for="repo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Repositório
                    <span class="example-badge">ex: vscode</span>
                </label>
                <input type="text" id="repo" name="repo" placeholder="Digite o nome do repositório" required>
            </div>

            <button type="submit" id="submit-btn">
                <span id="btn-text">Consultar Milestones</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </form>

        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Voltar ao Dashboard
        </a>
    </div>

    <script>
        function handleSubmit(event) {
            const button = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            // Adicionar loading
            btnText.innerHTML = '<div class="loading"></div>';
            button.disabled = true;

            // O formulário continua com o submit normal
            return true;
        }

        // Adicionar validação em tempo real
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', function () {
                if (this.value.length > 0) {
                    this.style.borderColor = 'rgba(34, 197, 94, 0.5)';
                } else {
                    this.style.borderColor = 'rgba(139, 92, 246, 0.3)';
                }
            });
        });
    </script>
</body>

</html>
